<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fareed Ultra Speed v23</title>
    <style>
        :root { --main-color: #00f2ff; --bg-color: #0a0f1e; }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 25px; border: 1px solid var(--main-color); box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); text-align: center; backdrop-filter: blur(10px); width: 85%; max-width: 400px; }
        .speed-val { font-size: 5rem; font-weight: 900; color: var(--main-color); margin: 10px 0; font-family: monospace; }
        .status { color: #94a3b8; font-size: 0.9rem; margin-top: 15px; min-height: 20px; }
        .btn { background: var(--main-color); color: #0a0f1e; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.1rem; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--main-color); }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Fareed High-Speed</h2>
    <div class="speed-val" id="speedDisplay">000</div>
    <div style="color: var(--main-color)">Mbps</div>
    <div class="status" id="statusLabel">جاهز للاختراق...</div>
    <br>
    <button class="btn" id="actionBtn" onclick="toggleTurbo()">إطلاق التوربو</button>
</div>

<script>
    let active = false;
    const sources = [
        "https://dl.google.com/chrome/install/latest/chrome_installer.exe",
        "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/70367f0e-3d96-444a-939e-450f384c3c3e/MicrosoftEdgeEnterpriseX64.msi",
        "https://speed.cloudflare.com/__down?bytes=50000000"
    ];

    function toggleTurbo() {
        active = !active;
        const btn = document.getElementById('actionBtn');
        if(active) {
            btn.innerText = "إيقاف (تصفير العداد)";
            btn.style.background = "#ff4757";
            runWave();
        } else {
            location.reload();
        }
    }

    async function runWave() {
        while(active) {
            const status = document.getElementById('statusLabel');
            status.innerText = "جاري الضخ بأقصى قدرة (Wave On)...";
            status.className = "status pulse";

            // فتح 25 قناة متوازية عشوائية
            const controllers = [];
            for(let i=0; i<25; i++) {
                const controller = new AbortController();
                controllers.push(controller);
                const url = sources[Math.floor(Math.random() * sources.length)] + "?t=" + Math.random();
                fetch(url, { mode: 'no-cors', signal: controller.signal });
            }

            // عرض سرعة عشوائية تحفيزية (محاكاة للواقع الذي نريده)
            const randomSpeed = (Math.random() * (425 - 395) + 395).toFixed(2);
            document.getElementById('speedDisplay').innerText = randomSpeed;

            // مدة الموجة: عشوائية بين 4 إلى 8 ثوانٍ
            const waveTime = Math.floor(Math.random() * 4000) + 4000;
            await new Promise(r => setTimeout(r, waveTime));

            // إيقاف الموجة فوراً (Cool-down)
            status.innerText = "استراحة تكتيكية (Cool-down)...";
            status.className = "status";
            controllers.forEach(c => c.abort()); // قتل كل الاتصالات فوراً
            
            await new Promise(r => setTimeout(r, 1500)); // استراحة ثانية ونصف لتضليل البرج
        }
    }
</script>

</body>
</html>
